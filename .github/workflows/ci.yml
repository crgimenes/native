name: test

on: [push, pull_request, workflow_dispatch]

jobs:
  test:
    name: test-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      # macOS runs the real NSPasteboard round-trip, Windows the Win32 one. Linux
      # has no clipboard backend yet, so its clipboard test skips itself.
      - run: go test ./...

  cross:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # Compile-check every GOOS/GOARCH so arch-specific build-tag / ABI breakage
      # is caught even on targets without a runner here.
      - run: make cross

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - name: Lint (every backend / GOOS)
        run: |
          for os in darwin linux windows; do
            echo "== GOOS=$os =="
            GOOS=$os $(go env GOPATH)/bin/golangci-lint run ./...
          done
